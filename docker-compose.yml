services:
  backend:
    build: ./find-your-way-backend
    container_name: fyw-backend
    ports:
      - "3001:3001"
    volumes:
      - fyw-data:/app/data
    environment:
      PORT: 3001
      ADMIN_PIN: "1234"
    restart: unless-stopped

  frontend:
    build:
      context: ./find-your-way-frontend
      args:
        VITE_API_URL: https://fyw.tncg.de
        VITE_WS_URL: wss://fyw.tncg.de
    container_name: fyw-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fyw-data:
