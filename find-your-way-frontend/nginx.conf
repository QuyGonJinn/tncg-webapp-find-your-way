server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Statische Assets mit Cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|mp4|webm|mp3|ogg|wav)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router – alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
