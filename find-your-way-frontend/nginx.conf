server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy für hochgeladene Dateien (direkt von Nginx)
    location /data/ {
        alias /app/data/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy für Backend API
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Statische Assets mit Cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|mp4|webm|mp3|ogg|wav)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router – alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
